name: ASDM Workspace Execution

on:
  workflow_dispatch:
    inputs:
      prompt-text:
        description: 'Prompt text for CodeBuddy'
        required: true
        default: ''
      workspace-git-url:
        description: 'Git URL of the workspace repository to work on'
        required: true
        default: ''
      workspace-git-token:
        description: 'Personal access token for the workspace repository (required for private repos and push operations)'
        required: false
        default: ''
      workspace-git-branch:
        description: 'Branch of the workspace repository to checkout (base branch)'
        required: false
        default: 'main'
      workspace-git-branch-target:
        description: 'Target branch name to create from workspace-git-branch for PR'
        required: false
        default: ''
      verbose:
        description: 'Enable verbose logging'
        required: false
        default: true
        type: boolean
      output-format:
        description: 'Output format'
        required: false
        default: 'stream-json'
        type: choice
        options:
          - stream-json
          - json
          - text

env:
  ACTIONS_STEP_DEBUG: true
  ACTIONS_RUNNER_DEBUG: true

jobs:
  execute-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout workspace repository
        env:
          WORKSPACE_GIT_URL: ${{ github.event.inputs.workspace-git-url }}
          WORKSPACE_GIT_BRANCH: ${{ github.event.inputs.workspace-git-branch }}
          WORKSPACE_GIT_TOKEN: ${{ github.event.inputs.workspace-git-token }}
        run: |
          # Configure git to use token for authentication
          if [ -n "$WORKSPACE_GIT_TOKEN" ]; then
            # Extract host from URL for credential helper
            GIT_HOST=$(echo "$WORKSPACE_GIT_URL" | sed -E 's|.*@([^:/]+).*|\1|' | head -1)
            
            # Configure credential helper
            git config --global credential.helper store
            echo "https://x-access-token:${WORKSPACE_GIT_TOKEN}@${GIT_HOST}" > ~/.git-credentials
            
            # Clone with token embedded in URL if it's an HTTPS URL
            if [[ "$WORKSPACE_GIT_URL" == https://* ]]; then
              AUTH_URL=$(echo "$WORKSPACE_GIT_URL" | sed "s|https://|https://x-access-token:${WORKSPACE_GIT_TOKEN}@|")
              git clone --branch "$WORKSPACE_GIT_BRANCH" --single-branch "$AUTH_URL" workspace
            else
              git clone --branch "$WORKSPACE_GIT_BRANCH" --single-branch "$WORKSPACE_GIT_URL" workspace
            fi
          else
            git clone --branch "$WORKSPACE_GIT_BRANCH" --single-branch "$WORKSPACE_GIT_URL" workspace
          fi
          
          echo "Workspace repository cloned to: $(pwd)/workspace"
          ls -la workspace

      - name: Configure Git and create target branch
        if: ${{ github.event.inputs.workspace-git-branch-target != '' }}
        env:
          WORKSPACE_GIT_BRANCH: ${{ github.event.inputs.workspace-git-branch }}
          WORKSPACE_GIT_BRANCH_TARGET: ${{ github.event.inputs.workspace-git-branch-target }}
          WORKSPACE_GIT_TOKEN: ${{ github.event.inputs.workspace-git-token }}
        working-directory: ${{ github.workspace }}/workspace
        run: |
          # Configure git for commits
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Ensure credential helper is configured for push
          if [ -n "$WORKSPACE_GIT_TOKEN" ]; then
            GIT_HOST=$(git remote get-url origin | sed -E 's|.*@([^:/]+).*|\1|' | head -1)
            git config --global credential.helper store
            echo "https://x-access-token:${WORKSPACE_GIT_TOKEN}@${GIT_HOST}" > ~/.git-credentials
          fi

          # Create and checkout new branch from current branch
          echo "Creating new branch '$WORKSPACE_GIT_BRANCH_TARGET' from '$WORKSPACE_GIT_BRANCH'"
          git checkout -b "$WORKSPACE_GIT_BRANCH_TARGET"

          # Push the new branch to remote
          git push -u origin "$WORKSPACE_GIT_BRANCH_TARGET"
          echo "Branch '$WORKSPACE_GIT_BRANCH_TARGET' created and pushed to remote"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CodeBuddy
        run: |
          npm install -g @tencent-ai/codebuddy-code
          codebuddy --version

      - name: Build Log Parser
        run: |
          cd tools/codebuddy-log-parser
          npm install
          npm run build

      - name: Execute task with CodeBuddy
        env:
          CODEBUDDY_API_KEY: ${{ secrets.CODEBUDDY_API_KEY }}
          CODEBUDDY_INTERNET_ENVIRONMENT: ${{ secrets.CODEBUDDY_INTERNET_ENVIRONMENT }}
        working-directory: ${{ github.workspace }}/workspace
        run: |
          LOG_FILE="${{ github.workspace }}/execution.log"
          PARSER="${{ github.workspace }}/tools/codebuddy-log-parser/dist/index.js"
          
          ARGS="-p \"${{ inputs.prompt-text }}\" -y --output-format stream-json"
          if [ "${{ inputs.verbose }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi
          
          echo "=== CodeBuddy Execution Log (human-chat format) ==="
          echo ""
          echo "Working directory: $(pwd)"
          echo ""
          
          # Run codebuddy with stream-json, save to file and parse in real-time via pipe
          eval "codebuddy $ARGS" 2>&1 | tee "$LOG_FILE" | node "$PARSER" --stdin --stream -f human-chat --no-color

      - name: Parse final log
        if: always()
        run: |
          LOG_FILE="${{ github.workspace }}/execution.log"
          PARSER="${{ github.workspace }}/tools/codebuddy-log-parser/dist/index.js"
          
          if [ -f "$LOG_FILE" ]; then
            echo ""
            echo "=== Final Parsed Log ==="
            cat "$LOG_FILE" | node "$PARSER" --stdin -f human-chat --no-color 2>/dev/null || echo "Log file exists but parser failed"
            
            # Also generate JSON output for artifacts
            cat "$LOG_FILE" | node "$PARSER" --stdin -f json > "${{ github.workspace }}/execution-parsed.json" 2>/dev/null || true
          fi

      - name: Check for changes and create PR
        if: ${{ github.event.inputs.workspace-git-branch-target != '' }}
        env:
          WORKSPACE_GIT_BRANCH: ${{ github.event.inputs.workspace-git-branch }}
          WORKSPACE_GIT_BRANCH_TARGET: ${{ github.event.inputs.workspace-git-branch-target }}
          WORKSPACE_GIT_TOKEN: ${{ github.event.inputs.workspace-git-token }}
          GH_TOKEN: ${{ github.event.inputs.workspace-git-token }}
        working-directory: ${{ github.workspace }}/workspace
        run: |
          PR_JSON_FILE="${{ github.workspace }}/pr.json"

          # Ensure credential helper is configured for push
          if [ -n "$WORKSPACE_GIT_TOKEN" ]; then
            GIT_HOST=$(git remote get-url origin | sed -E 's|.*@([^:/]+).*|\1|' | head -1)
            git config --global credential.helper store
            echo "https://x-access-token:${WORKSPACE_GIT_TOKEN}@${GIT_HOST}" > ~/.git-credentials
          fi

          # Check if there are any changes (including untracked files)
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes detected. Skipping commit and PR creation."
            echo '{"status": "no_changes", "message": "No changes detected. PR not created."}' > "$PR_JSON_FILE"
            exit 0
          fi

          echo "Changes detected:"
          git status --short

          echo "Changes detected. Committing and pushing..."

          # Add all changes
          git add -A

          # Commit changes
          git commit -m "chore: automated changes from CodeBuddy"

          # Push changes to target branch
          git push origin "$WORKSPACE_GIT_BRANCH_TARGET"

          # Create Pull Request using GitHub CLI
          set +e
          PR_RESULT=$(gh pr create \
            --title "Auto-generated: CodeBuddy changes" \
            --body "Automated changes from CodeBuddy workflow execution." \
            --base "$WORKSPACE_GIT_BRANCH" \
            --head "$WORKSPACE_GIT_BRANCH_TARGET" \
            --draft 2>&1)
          PR_EXIT_CODE=$?
          set -e

          if [ $PR_EXIT_CODE -eq 0 ]; then
            echo "PR created successfully: $PR_RESULT"
            # Extract PR number from URL (e.g., https://github.com/owner/repo/pull/123)
            PR_URL=$(echo "$PR_RESULT" | grep -oE 'https://[^ ]+pull/[0-9]+' | head -1)
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            
            # Get PR info in JSON format
            if [ -n "$PR_NUMBER" ]; then
              PR_JSON=$(gh pr view "$PR_NUMBER" --json number,url,title,state,createdAt,headRefName,baseRefName 2>/dev/null || echo "")
              if [ -n "$PR_JSON" ]; then
                echo "$PR_JSON" > "$PR_JSON_FILE"
              else
                # Fallback: construct minimal JSON from available info
                echo "{\"number\": $PR_NUMBER, \"url\": \"$PR_URL\", \"title\": \"Auto-generated: CodeBuddy changes\", \"state\": \"OPEN\", \"headRefName\": \"$WORKSPACE_GIT_BRANCH_TARGET\", \"baseRefName\": \"$WORKSPACE_GIT_BRANCH\"}" > "$PR_JSON_FILE"
              fi
            else
              echo "{\"status\": \"created\", \"url\": \"$PR_RESULT\"}" > "$PR_JSON_FILE"
            fi
          else
            echo "PR create failed with exit code $PR_EXIT_CODE"
            echo "Error output: $PR_RESULT"
            
            # Check if PR already exists for this branch
            EXISTING_PR=$(gh pr list --head "$WORKSPACE_GIT_BRANCH_TARGET" --json number,url,title,state 2>/dev/null | jq '.[0]' 2>/dev/null || echo "")
            
            if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ] && [ "$EXISTING_PR" != "" ]; then
              echo "PR already exists for this branch"
              echo "{\"status\": \"already_exists\", \"pr\": $EXISTING_PR}" > "$PR_JSON_FILE"
            else
              echo "PR creation failed and no existing PR found"
              # Escape the error message for JSON
              ERROR_MSG=$(echo "$PR_RESULT" | jq -Rs .)
              echo "{\"status\": \"error\", \"message\": $ERROR_MSG, \"exitCode\": $PR_EXIT_CODE}" > "$PR_JSON_FILE"
            fi
          fi

          echo "PR creation process completed"
          echo "PR info saved to: $PR_JSON_FILE"
          cat "$PR_JSON_FILE"

      - name: Upload log artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-logs
          path: |
            execution.log
            execution-parsed.json
            pr.json
          retention-days: 7
