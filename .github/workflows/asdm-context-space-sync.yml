name: ASDM Context Space Sync

on:
  workflow_dispatch:
    inputs:
      repo-url:
        description: 'Public GitHub repository URL'
        required: true
        default: ''
      branch:
        description: 'Branch name (fallback to master if main not found)'
        required: false
        default: 'main'
        type: string
      prompt-type:
        description: 'Analysis prompt type'
        required: true
        default: 'general'
        type: choice
        options:
          - general
          - springboot-api

env:
  ACTIONS_STEP_DEBUG: true
  ACTIONS_RUNNER_DEBUG: true

jobs:
  analyze-repository:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CodeBuddy
        run: |
          npm install -g @tencent-ai/codebuddy-code
          codebuddy --version

      - name: Build Log Parser
        run: |
          cd tools/codebuddy-log-parser
          npm install
          npm run build

      - name: Clone target repository
        id: clone-repo
        env:
          REPO_URL: ${{ inputs.repo-url }}
          BRANCH: ${{ inputs.branch }}
        run: |
          # Extract repo name from URL
          REPO_NAME=$(echo "$REPO_URL" | sed 's/.*\///' | sed 's/\.git$//')
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_OUTPUT
          
          echo "Cloning repository: $REPO_URL"
          echo "Requested branch: $BRANCH"
          
          # Try to clone with specified branch
          if git clone --branch "$BRANCH" --single-branch "$REPO_URL" "$REPO_NAME" 2>/dev/null; then
            echo "✓ Successfully cloned on branch: $BRANCH"
            echo "ACTUAL_BRANCH=$BRANCH" >> $GITHUB_OUTPUT
          else
            echo "Failed to clone on branch '$BRANCH', trying fallback branches..."
            
            # If requested branch is main, try master
            if [ "$BRANCH" = "main" ]; then
              if git clone --branch master --single-branch "$REPO_URL" "$REPO_NAME" 2>/dev/null; then
                echo "✓ Successfully cloned on branch: master"
                echo "ACTUAL_BRANCH=master" >> $GITHUB_OUTPUT
              else
                echo "✗ Error: Failed to clone repository on both main and master branches"
                exit 1
              fi
            else
              # If requested branch is not main, try main first, then master
              if git clone --branch main --single-branch "$REPO_URL" "$REPO_NAME" 2>/dev/null; then
                echo "✓ Successfully cloned on branch: main"
                echo "ACTUAL_BRANCH=main" >> $GITHUB_OUTPUT
              elif git clone --branch master --single-branch "$REPO_URL" "$REPO_NAME" 2>/dev/null; then
                echo "✓ Successfully cloned on branch: master"
                echo "ACTUAL_BRANCH=master" >> $GITHUB_OUTPUT
              else
                echo "✗ Error: Failed to clone repository on any branch"
                exit 1
              fi
            fi
          fi
          
          echo ""
          echo "Repository cloned to: $REPO_NAME"
          cd "$REPO_NAME"
          echo "Current commit: $(git log -1 --oneline)"

      - name: Create asdm-context-space-result directory
        id: create-result-dir
        env:
          REPO_NAME: ${{ steps.clone-repo.outputs.REPO_NAME }}
        run: |
          cd "$REPO_NAME"
          RESULT_DIR="$(pwd)/asdm-context-space-result"
          mkdir -p "$RESULT_DIR"
          echo "RESULT_DIR=$RESULT_DIR" >> $GITHUB_OUTPUT
          echo "Created asdm-context-space-result directory at: $RESULT_DIR"

      - name: Analyze repository with CodeBuddy
        env:
          CODEBUDDY_API_KEY: ${{ secrets.CODEBUDDY_API_KEY }}
          CODEBUDDY_INTERNET_ENVIRONMENT: ${{ secrets.CODEBUDDY_INTERNET_ENVIRONMENT }}
          REPO_NAME: ${{ steps.clone-repo.outputs.REPO_NAME }}
          RESULT_DIR: ${{ steps.create-result-dir.outputs.RESULT_DIR }}
          PROMPT_TYPE: ${{ inputs.prompt-type }}
        run: |
          cd "$REPO_NAME"
          
          LOG_FILE="${{ github.workspace }}/analysis.log"
          PARSER="${{ github.workspace }}/tools/codebuddy-log-parser/dist/index.js"
          
          # Select prompt file based on prompt-type input
          case "$PROMPT_TYPE" in
            springboot-api)
              PROMPT_FILE="${{ github.workspace }}/.github/workflows/ANALYSIS_PROMPT_SpringBoot_API.md"
              ;;
            general|*)
              PROMPT_FILE="${{ github.workspace }}/.github/workflows/ANALYSIS_PROMPT.md"
              ;;
          esac
          
          echo "Selected prompt type: $PROMPT_TYPE"
          echo "Using prompt file: $PROMPT_FILE"
          
          # Read prompt template and replace placeholder with actual result directory
          ANALYSIS_PROMPT=$(sed "s|{RESULT_DIR}|$RESULT_DIR|g" "$PROMPT_FILE")

          # Print the actual prompt content for debugging
          echo "=== Prompt Content ==="
          echo "$ANALYSIS_PROMPT"
          echo "=== End of Prompt ==="
          echo ""

          echo "=== Starting CodeBuddy Analysis ==="
          echo "Repository: $REPO_NAME"
          echo "Result directory: $RESULT_DIR"
          echo ""
          
          # Run codebuddy with stream-json, save to file and parse in real-time via pipe
          eval "codebuddy -p \"$ANALYSIS_PROMPT\" -y --output-format stream-json" 2>&1 | tee "$LOG_FILE" | node "$PARSER" --stdin --stream -f human-chat --no-color

      - name: Parse final log
        if: always()
        env:
          RESULT_DIR: ${{ steps.create-result-dir.outputs.RESULT_DIR }}
        run: |
          LOG_FILE="${{ github.workspace }}/analysis.log"
          PARSER="${{ github.workspace }}/tools/codebuddy-log-parser/dist/index.js"
          
          if [ -f "$LOG_FILE" ]; then
            echo ""
            echo "=== Final Parsed Log ==="
            cat "$LOG_FILE" | node "$PARSER" --stdin -f human-chat --no-color 2>/dev/null || echo "Log file exists but parser failed"
            
            # Also generate JSON output for artifacts
            cat "$LOG_FILE" | node "$PARSER" --stdin -f json > "$RESULT_DIR/analysis-log.json" 2>/dev/null || true
          fi

      - name: Generate context space metadata
        run: |
          REPO_NAME="${{ steps.clone-repo.outputs.REPO_NAME }}"
          ACTUAL_BRANCH="${{ steps.clone-repo.outputs.ACTUAL_BRANCH }}"
          RESULT_DIR="${{ steps.create-result-dir.outputs.RESULT_DIR }}"
          
          # Create metadata file
          cat > "$RESULT_DIR/metadata.json" << EOF
          {
            "repository": {
              "url": "${{ inputs.repo-url }}",
              "name": "$REPO_NAME",
              "branch": "$ACTUAL_BRANCH",
              "requested_branch": "${{ inputs.branch }}"
            },
            "analysis": {
              "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
              "workflow_run_id": "${{ github.run_id }}",
              "result_directory": "$RESULT_DIR",
              "prompt_type": "${{ inputs.prompt-type }}"
            }
          }
          EOF
          
          echo "Metadata generated:"
          cat "$RESULT_DIR/metadata.json"
          
          echo ""
          echo "Generated files in result directory:"
          ls -la "$RESULT_DIR/" || echo "No files generated yet"

      - name: Upload analysis logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-logs
          path: analysis.log
          retention-days: 7

      - name: Upload context space artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asdm-context-space-result
          path: ${{ steps.clone-repo.outputs.REPO_NAME }}/asdm-context-space-result/
          retention-days: 30

      - name: Summary
        if: always()
        env:
          REPO_NAME: ${{ steps.clone-repo.outputs.REPO_NAME }}
        run: |
          echo "======================================"
          echo "Context Space Sync Completed"
          echo "======================================"
          echo "Repository: ${{ inputs.repo-url }}"
          echo "Branch: ${{ steps.clone-repo.outputs.ACTUAL_BRANCH }}"
          echo "Prompt Type: ${{ inputs.prompt-type }}"
          echo "Result directory: ${{ steps.create-result-dir.outputs.RESULT_DIR }}"
          echo ""
          echo "Artifacts:"
          echo "  - asdm-context-space-result: Analysis results (30 days retention)"
          echo "  - analysis-logs: Execution logs (7 days retention)"
          echo ""
          echo "Generated files:"
          ls -la "$REPO_NAME/asdm-context-space-result/" 2>/dev/null || echo "No files in result directory"
          echo "======================================"
